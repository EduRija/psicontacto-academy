<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Compra realizada</title>

  <link rel="stylesheet" href="css/aula.css">

  <style>

    .exito-body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef7f7, #f8fbff);
      font-family: sans-serif;
    }

    .exito-card {
      width: 90%;
      max-width: 520px;
      background: white;
      border-radius: 32px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.10);
    }

    .check {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #14b8a6;
      color: white;
      font-size: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .btn-descarga-final {
      display: block;
      margin-top: 30px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f766e, #2563eb);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    .btn-volver-curso {
      display: inline-block;
      margin-top: 18px;
      color: #14566d;
      text-decoration: none;
    }

  </style>

</head>

<body class="exito-body">

  <div class="exito-card">

    <div class="check">✓</div>

    <h1>¡Compra realizada con éxito!</h1>

    <p>
      Gracias por formar parte de Psicontacto Academy.
      Ya podés acceder al material del curso.
    </p>

    <a class="btn-descarga-final"
       href="assets/pdf/curso_ansiedad.pdf"
       download>

      Descargar E-Book

    </a>

    <a class="btn-volver-curso"
       href="cursos/curso_ansiedad.html">

      Volver al curso

    </a>

  </div>

</body>

</html>
